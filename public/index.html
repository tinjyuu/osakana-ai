<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Osakana AI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="tank" aria-label="Osakana AI observation tank">
        <div class="topbar">
          <div>
            <p class="eyebrow">OSAKANA LAB // SPECIMEN 01</p>
            <h1>Osakana AI</h1>
          </div>
          <div class="connection" id="connection">offline</div>
        </div>

        <div id="scene" class="scene" aria-label="3D aquarium"></div>

        <div class="transcript">
          <p class="speaker" id="speaker">Osakana AI</p>
          <p id="subtitle">Press the mic if you want to wake me. Silence is fine, but human silence is usually dull.</p>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-header">
          <p class="eyebrow">state</p>
          <h2>Creature</h2>
        </div>

        <div class="meters">
          <label>
            <span>Affection</span>
            <meter id="affection" min="0" max="100" value="42"></meter>
          </label>
          <label>
            <span>Hunger</span>
            <meter id="hunger" min="0" max="100" value="32"></meter>
          </label>
          <label>
            <span>Boredom</span>
            <meter id="boredom" min="0" max="100" value="18"></meter>
          </label>
          <label>
            <span>Trust</span>
            <meter id="trust" min="0" max="100" value="24"></meter>
          </label>
        </div>

        <div class="mood">
          <span>Mood</span>
          <strong id="mood">suspicious</strong>
        </div>

        <div class="mail-panel">
          <div class="mail-head">
            <span>mail</span>
            <strong id="mailStatus">not registered</strong>
          </div>
          <form class="mail-form" id="mailForm">
            <input id="mailInput" type="email" autocomplete="email" placeholder="mail@example.com" />
            <button id="mailConnectButton" type="submit">Connect</button>
          </form>
          <button id="mailCritiqueButton" type="button">Critique Mail</button>
          <p class="mail-preview" id="mailPreview">No mail</p>
        </div>

        <div class="controls">
          <button class="primary" id="talkButton" type="button">
            <span id="talkIcon">●</span>
            <span id="talkLabel">Start Talk</span>
          </button>
          <button id="feedButton" type="button">Drop Food</button>
          <button id="teaseButton" type="button">Tap Glass</button>
        </div>

        <form class="text-form" id="textForm">
          <input id="textInput" type="text" autocomplete="off" placeholder="Talk by text, too" />
          <button type="submit">Send</button>
        </form>

        <div class="log" id="log" aria-live="polite"></div>
      </aside>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
